<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Liquidation Sales">
<title>Liquidation Sales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#15130E;font-family:-apple-system,sans-serif;color:#EDE9E3;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,button{font-family:inherit}
input::placeholder{color:rgba(237,233,227,.25)}
input:focus{outline:none}
input[type=date]{color-scheme:dark}
#app{min-height:100vh;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
.topbar{background:#1B1912;border-bottom:1px solid rgba(255,255,255,.06);padding:calc(52px + env(safe-area-inset-top,0px)) 20px 16px}
.topbar-row{display:flex;justify-content:space-between;align-items:flex-end}
.app-eyebrow{font-size:10px;font-weight:700;letter-spacing:.12em;color:rgba(200,169,110,.6);text-transform:uppercase;margin-bottom:4px}
.app-title{font-weight:800;font-size:22px;color:#EDE9E3;letter-spacing:-.04em}
.add-btn{background:#C8A96E;color:#15130E;border:none;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#1B1912;border-top:1px solid rgba(255,255,255,.06);display:flex;padding-bottom:env(safe-area-inset-bottom,8px);z-index:100}
.tb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;color:rgba(237,233,227,.35)}
.tb.on{color:#C8A96E}
.tb .ic{font-size:22px}
.tb .lb{font-size:10px;font-weight:500}
.tb.on .lb{font-weight:700}
.page{padding:14px;display:none}
.page.on{display:block}
.card{background:#1B1912;border-radius:16px;border:1px solid rgba(255,255,255,.06)}
.hero{background:linear-gradient(135deg,#2A220F,#1F1A0D);border-radius:20px;padding:22px 20px;margin-bottom:12px;border:1px solid rgba(200,169,110,.15)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:#1B1912;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:13px 10px;text-align:center}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.sp{border-radius:14px;padding:14px 8px;text-align:center}
.sec{font-size:12px;font-weight:700;color:rgba(237,233,227,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.div{height:1px;background:rgba(255,255,255,.055)}
.search-wrap{position:relative;margin-bottom:12px}
.si{width:100%;background:#1B1912;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 12px 12px 38px;font-size:16px;color:#EDE9E3}
.filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.fp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;color:rgba(237,233,227,.5)}
.fp.on{background:#C8A96E;color:#15130E;border-color:#C8A96E}
.irow{display:flex;gap:10px;padding:13px 16px;align-items:flex-start}
.ibar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.bs{background:rgba(124,184,122,.15);color:#7CB87A}
.bu{background:rgba(200,169,110,.15);color:#C8A96E}
.bd{background:rgba(212,130,106,.15);color:#D4826A}
.be{background:rgba(255,255,255,.06);border:none;color:rgba(237,233,227,.55);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
.bx{background:rgba(212,130,106,.1);border:none;color:#D4826A;border-radius:7px;padding:5px 8px;font-size:12px;cursor:pointer}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:flex-end;z-index:200;backdrop-filter:blur(8px)}
.modal-ov.on{display:flex}
.modal-sh{background:#1B1912;border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:16px;color:#EDE9E3;margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:rgba(237,233,227,.4);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.so{flex:1;border-radius:10px;padding:10px 4px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(237,233,227,.35)}
.sub-btn{width:100%;background:linear-gradient(135deg,#C8A96E,#B08040);color:#15130E;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer}
#catscreen{display:none;position:fixed;inset:0;background:#15130E;z-index:150;overflow-y:auto;padding-bottom:24px}
#catscreen.on{display:block}
.catheader{background:#1B1912;border-bottom:1px solid rgba(255,255,255,.06);padding:calc(52px + env(safe-area-inset-top,0px)) 16px 0}
.backbtn{background:rgba(255,255,255,.07);border:none;color:#EDE9E3;width:36px;height:36px;border-radius:10px;font-size:20px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center}
.mstat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 15px;flex-shrink:0;text-align:center}
#loadscreen{position:fixed;inset:0;background:#15130E;display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:12px}
#loadscreen.gone{display:none}
.saving{position:fixed;top:calc(16px + env(safe-area-inset-top,0px));right:16px;background:rgba(200,169,110,.15);border:1px solid rgba(200,169,110,.3);color:#C8A96E;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;z-index:500;opacity:0;transition:opacity .3s}
.saving.show{opacity:1}
</style>
</head>
<body>
<div id="loadscreen">
  <div style="font-size:36px">&#x1F4E6;</div>
  <div id="ltxt" style="color:rgba(237,233,227,.6);font-size:15px;font-weight:600">Loading...</div>
  <div id="lerr" style="color:#D4826A;font-size:11px;max-width:300px;text-align:center;margin-top:4px"></div>
</div>
<div class="saving" id="savebadge">Saving...</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div><div class="app-eyebrow">Amazon</div><div class="app-title">Liquidation Sales</div></div>
      <button class="add-btn" onclick="openAdd()">+ Add</button>
    </div>
  </div>
  <div id="phome" class="page on">
    <div class="hero">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;color:rgba(200,169,110,.6);text-transform:uppercase;margin-bottom:6px">Total Profit</div>
      <div id="hprofit" style="font-size:46px;font-weight:800;color:#C8A96E;letter-spacing:-2px;line-height:1">$0</div>
      <div id="hsub" style="font-size:12px;color:rgba(237,233,227,.4);margin-top:8px">0 sold</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div id="kinv" style="font-weight:800;font-size:19px;color:#7EB8C9">$0</div><div style="font-size:11px;color:rgba(237,233,227,.35);margin-top:3px">Invested</div></div>
      <div class="kpi"><div id="kpend" style="font-weight:800;font-size:19px;color:#C8A96E">$0</div><div style="font-size:11px;color:rgba(237,233,227,.35);margin-top:3px">Pending</div></div>
      <div class="kpi"><div id="ksr" style="font-weight:800;font-size:19px;color:#7CB87A">0%</div><div style="font-size:11px;color:rgba(237,233,227,.35);margin-top:3px">Sell Rate</div></div>
    </div>
    <div class="card" style="padding:16px 10px 8px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:rgba(237,233,227,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px">Monthly Profit</div>
      <div style="position:relative;height:160px">
        <canvas id="mchart"></canvas>
      </div>
    </div>
    <div class="sg">
      <div class="sp" style="background:rgba(124,184,122,.12)"><div style="font-size:20px;margin-bottom:4px">&#x2705;</div><div id="ssold" style="font-weight:800;font-size:22px;color:#7CB87A">0</div><div style="font-size:11px;color:#7CB87A;opacity:.7;margin-top:2px">Sold</div></div>
      <div class="sp" style="background:rgba(200,169,110,.1)"><div style="font-size:20px;margin-bottom:4px">&#x1F4E6;</div><div id="suns" style="font-weight:800;font-size:22px;color:#C8A96E">0</div><div style="font-size:11px;color:#C8A96E;opacity:.7;margin-top:2px">In Stock</div></div>
      <div class="sp" style="background:rgba(212,130,106,.1)"><div style="font-size:20px;margin-bottom:4px">&#x2715;</div><div id="sdns" style="font-weight:800;font-size:22px;color:#D4826A">0</div><div style="font-size:11px;color:#D4826A;opacity:.7;margin-top:2px">No Sale</div></div>
    </div>
    <div class="sec">Categories</div>
    <div class="card" id="catlist" style="overflow:hidden"></div>
  </div>
  <div id="pitems" class="page">
    <div class="search-wrap">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(237,233,227,.3);pointer-events:none">&#x1F50D;</span>
      <input class="si" id="srch" placeholder="Search items..." oninput="renderItems()" type="search">
    </div>
    <div class="filters" id="fpills"></div>
    <div class="card" id="ilist" style="overflow:hidden"></div>
  </div>
  <div id="preports" class="page">
    <div class="card" style="padding:16px 10px 8px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:rgba(237,233,227,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px">Profit by Category</div>
      <div style="position:relative;height:300px;overflow:hidden">
        <canvas id="cchart"></canvas>
      </div>
    </div>
    <div class="sec">Awaiting Sale</div>
    <div class="card" id="awlist" style="overflow:hidden;margin-bottom:14px"></div>
    <div class="sec">Top ROI Flips</div>
    <div class="card" id="roilist" style="overflow:hidden"></div>
  </div>
  <div class="tabbar">
    <button class="tb on" onclick="swTab('home',this)"><span class="ic">&#x26A1;</span><span class="lb">Home</span></button>
    <button class="tb" onclick="swTab('items',this)"><span class="ic">&#x1F4CB;</span><span class="lb">Items</span></button>
    <button class="tb" onclick="swTab('reports',this)"><span class="ic">&#x1F4CA;</span><span class="lb">Reports</span></button>
  </div>
</div>
<div id="catscreen">
  <div class="catheader">
    <button class="backbtn" onclick="closeCat()">&#8249;</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div id="caticon" style="width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
      <div><div id="cattitle" style="font-weight:800;font-size:19px;color:#EDE9E3"></div><div id="catcount" style="font-size:12px;color:rgba(237,233,227,.35);margin-top:2px"></div></div>
    </div>
    <div id="catstats" style="display:flex;gap:8px;padding-bottom:16px;overflow-x:auto"></div>
  </div>
  <div style="padding:12px 16px 0"><div class="card" id="catitems" style="overflow:hidden"></div></div>
</div>
<div class="modal-ov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sh">
    <div style="width:32px;height:3px;background:rgba(255,255,255,.13);border-radius:2px;margin:0 auto 18px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div id="mtitle" style="font-weight:800;font-size:18px;color:#EDE9E3">New Item</div>
      <button onclick="closeModal()" style="background:rgba(255,255,255,.07);border:none;color:rgba(237,233,227,.6);border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer">&#x2715;</button>
    </div>
    <label class="fl">Item Name</label><input class="fi" id="fname" placeholder="e.g. Gold Chandelier" oninput="uprev()">
    <label class="fl">Category</label><input class="fi" id="fcat" list="catsdl" placeholder="e.g. Indoor Lighting"><datalist id="catsdl"></datalist>
    <label class="fl">Brand (optional)</label><input class="fi" id="fbrand" placeholder="e.g. Forious">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">Paid ($)</label><input class="fi" id="fcost" type="number" min="0" step="0.01" placeholder="0" oninput="uprev()"></div>
      <div><label class="fl">Sold For ($)</label><input class="fi" id="fsold" type="number" min="0" step="0.01" placeholder="Blank if unsold" oninput="uprev()"></div>
    </div>
    <div id="prev" style="display:none;border-radius:10px;padding:10px 14px;margin-bottom:14px;justify-content:space-between">
      <span id="pproft" style="font-weight:700;font-size:14px"></span>
      <span id="proi" style="font-size:13px;color:rgba(237,233,227,.4)"></span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">Date Purchased</label><input class="fi" id="fdp" type="date"></div>
      <div><label class="fl">Date Sold</label><input class="fi" id="fds" type="date"></div>
    </div>
    <label class="fl">Status</label>
    <div style="display:flex;gap:8px;margin-bottom:22px">
      <button class="so" id="oSold" onclick="setSt('sold')">Sold</button>
      <button class="so" id="oUns" onclick="setSt('unsold')">In Stock</button>
      <button class="so" id="oDns" onclick="setSt('did_not_sell')">No Sale</button>
    </div>
    <button class="sub-btn" id="subbtn" onclick="saveItem()">Add Item</button>
  </div>
</div>

const $n = function(v){ return v==null ? "--" : "$"+Math.round(v).toLocaleString(); };
const dBetween = function(a,b){ if(!a||!b) return null; var v=Math.floor((new Date(b)-new Date(a))/86400000); return v<0?null:v; };
const dSince = function(d){ return d?Math.floor((Date.now()-new Date(d))/86400000):null; };

const SHEET_URL = "https://script.google.com/macros/s/AKfycbw1wMXTAqqtHDsE0RCN7RapIIi9O_nuamD2yQWNZA_GOsDinSoaO9CCFIZapaNPM1WL/exec";

function loadLocal(){
  try {
    var saved = localStorage.getItem("liquidation_products");
    if(saved) {
      var data = JSON.parse(saved);
      if(Array.isArray(data) && data.length > 0) {
        products = data;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function saveLocal(){
  try {
    localStorage.setItem("liquidation_products", JSON.stringify(products));
    showSaved();
  } catch(e) {}
}

// Silently backup to Google Sheets in background - never blocks UI
function backupToSheets(){
  try {
    fetch(SHEET_URL, { method:"POST", body:JSON.stringify(products) }).catch(function(){});
  } catch(e) {}
}

// Restore from Google Sheets (only used if localStorage is empty)
function restoreFromSheets(){
  return fetch(SHEET_URL).then(function(r){ return r.json(); }).then(function(data){
    if(!Array.isArray(data) || data.length === 0) return false;
    products = data.map(function(r){
      return {
        id: Number(r.id)||Date.now(),
        name: r.name||"",
        category: r.category||"",
        brand: r.brand||"",
        cost: Number(r.cost)||0,
        soldPrice: (r.soldPrice!==""&&r.soldPrice!=null)?Number(r.soldPrice):null,
        profit: (r.profit!==""&&r.profit!=null)?Number(r.profit):null,
        datePurchased: r.datePurchased||null,
        dateSold: r.dateSold||null,
        status: r.status||"unsold"
      };
    });
    return true;
  });
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    saveLocal();           // instant - saves to phone
    backupToSheets();      // background - saves to Google Sheets silently
  }, 300);
}

function init(){
  var loaded = loadLocal();
  if(loaded){
    // Load instantly from phone, done
    document.getElementById("loadscreen").className="gone";
    renderAll();
  } else {
    // First time or cleared - try to restore from Google Sheets
    document.getElementById("ltxt").textContent="Restoring from backup...";
    restoreFromSheets().then(function(restored){
      if(!restored){
        products = RAW.slice();
      }
      saveLocal();
      backupToSheets();
      document.getElementById("loadscreen").className="gone";
      renderAll();
    }).catch(function(){
      products = RAW.slice();
      saveLocal();
      document.getElementById("loadscreen").className="gone";
      renderAll();
    });
  }
}

function renderHome(){
  var sold=products.filter(function(p){ return p.status==="sold"; });
  var uns=products.filter(function(p){ return p.status==="unsold"; });
  var dns=products.filter(function(p){ return p.status==="did_not_sell"; });
  var tot=products.filter(function(p){ return p.name; }).length;

  // Realized profit: sold items profit minus no-sale losses
  var soldProfit=sold.reduce(function(a,p){ return a+(p.profit||0); },0);
  var dnsLoss=dns.reduce(function(a,p){ return a+(p.cost||0); },0);
  var realizedProfit=soldProfit - dnsLoss;

  // Pending: money tied up in unsold stock
  var pending=uns.reduce(function(a,p){ return a+(p.cost||0); },0);

  // Net profit = realized minus pending (total true position)
  var netProfit = realizedProfit - pending;

  var tr=sold.reduce(function(a,p){ return a+(p.soldPrice||0); },0);
  var ti=products.reduce(function(a,p){ return a+(p.cost||0); },0);
  var sr=tot?Math.round((sold.length/tot)*100):0;

  document.getElementById("hprofit").textContent=$n(netProfit);
  document.getElementById("hsub").textContent=sold.length+" sold · "+$n(tr)+" revenue · -"+$n(dnsLoss)+" losses";
  document.getElementById("kinv").textContent=$n(ti);
  document.getElementById("kpend").textContent=$n(pending);
  document.getElementById("ksr").textContent=sr+"%";
  document.getElementById("ssold").textContent=sold.length;
  document.getElementById("suns").textContent=uns.length;
  document.getElementById("sdns").textContent=dns.length;
  renderMChart(sold);
  renderCatList();
}

function renderMChart(sold){
  var map={};
  sold.forEach(function(p){
    if(!p.dateSold) return;
    var k=p.dateSold.slice(0,7);
    if(!map[k]) map[k]={k:k,p:0};
    map[k].p+=p.profit||0;
  });
  var data=Object.values(map).sort(function(a,b){ return a.k.localeCompare(b.k); }).slice(-12);
  var labels=data.map(function(d){ return new Date(d.k+"-01").toLocaleDateString("en-US",{month:"short",year:"2-digit"}); });
  var vals=data.map(function(d){ return Math.round(d.p); });
  var ctx=document.getElementById("mchart").getContext("2d");
  if(mChart) mChart.destroy();
  mChart=new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{data:vals,label:"Profit",borderColor:"#C8A96E",borderWidth:2,backgroundColor:"rgba(200,169,110,.15)",fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:"#C8A96E"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return "$"+Math.round(c.raw).toLocaleString(); }}}},scales:{x:{grid:{color:"rgba(255,255,255,.05)"},ticks:{color:"rgba(237,233,227,.35)",font:{size:10}}},y:{grid:{color:"rgba(255,255,255,.05)"},ticks:{color:"rgba(237,233,227,.25)",font:{size:9},callback:function(v){ return "$"+v; }}}}}});
}

function getCatMap(){
  var m={};
  products.filter(function(p){ return p.name; }).forEach(function(p){
    var c=p.category||"Other";
    if(!m[c]) m[c]={name:c,profit:0,sold:0,total:0};
    m[c].total++;
    if(p.status==="sold"){ m[c].sold++; m[c].profit+=p.profit||0; }
  });
  return Object.values(m).sort(function(a,b){ return b.profit-a.profit; });
}

function renderCatList(){
  var cats=getCatMap();
  var html="";
  cats.forEach(function(c,i){
    var col=catColor(c.name);

    var pc=c.profit>0?"#7CB87A":"rgba(237,233,227,.3)";
    var n=c.name.replace(/'/g,"&#39;");

function openCat(btn){
  var name = btn ? btn.getAttribute("data-cat") : curCat;
  curCat=name;
  var items=products.filter(function(p){ return p.category===name; });
  var sold=items.filter(function(p){ return p.status==="sold"; });
  var profit=sold.reduce(function(a,p){ return a+(p.profit||0); },0);
  var rev=sold.reduce(function(a,p){ return a+(p.soldPrice||0); },0);
  var sr=items.length?Math.round((sold.length/items.length)*100):0;
  var col=catColor(name);
  document.getElementById("cattitle").textContent=name;
  document.getElementById("catcount").textContent=items.length+" items";
  document.getElementById("caticon").style.cssText="width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:"+col+"18;border:1px solid "+col+"30";
  document.getElementById("caticon").innerHTML='<div style="width:14px;height:14px;border-radius:4px;background:'+col+'"></div>';
  var stats=[[$n(profit),"Profit","#7CB87A"],[$n(rev),"Revenue",col],[sold.length,"Sold","#7CB87A"],[sr+"%","Sell Rate",col]];
  document.getElementById("catstats").innerHTML=stats.map(function(s){ return '<div class="mstat"><div style="font-weight:800;font-size:18px;color:'+s[2]+'">'+s[0]+'</div><div style="font-size:11px;color:rgba(237,233,227,.35);margin-top:2px">'+s[1]+'</div></div>'; }).join("");
  var sorted=items.slice().sort(function(a,b){ var o={sold:0,unsold:1,did_not_sell:2}; return (o[a.status]||0)-(o[b.status]||0); });
  document.getElementById("catitems").innerHTML=sorted.map(function(p,i){ return itemHTML(p,i>0); }).join("");
  document.getElementById("catscreen").className="on";
}

function renderItems(){
  var sold=products.filter(function(p){ return p.status==="sold"; });

  var tot=products.filter(function(p){ return p.name; }).length;
  var pills=[["all","All",tot],["sold","Sold",sold.length],["unsold","In Stock",uns.length],["did_not_sell","No Sale",dns.length]];
  document.getElementById("fpills").innerHTML=pills.map(function(x){
    var cls="fp"+(curFilter===x[0]?" on":"");
    return '<button class="'+cls+'" onclick="setFilt(&#39;'+x[0]+'&#39;)">'+x[1]+' <span style="opacity:.7">('+x[2]+')</span></button>';
  }).join("");
  var q=(document.getElementById("srch").value||"").toLowerCase();
  var f=products.filter(function(p){ return p.name; });
  if(curFilter!=="all") f=f.filter(function(p){ return p.status===curFilter; });
  if(q) f=f.filter(function(p){ return p.name.toLowerCase().indexOf(q)>=0||(p.brand||"").toLowerCase().indexOf(q)>=0; });
  f.sort(function(a,b){ return (b.id||0)-(a.id||0); });

}

  editId=null;
  document.getElementById("mtitle").textContent="New Item";
  document.getElementById("subbtn").textContent="Add Item";
  ["fname","fcat","fbrand","fcost","fsold","fds"].forEach(function(id){ document.getElementById(id).value=""; });
  document.getElementById("fdp").value=new Date().toISOString().slice(0,10);
  setSt("unsold"); uprev();
  document.getElementById("modal").className="modal-ov on";
  setTimeout(function(){ document.getElementById("fname").focus(); },100);
}
function openEdit(id){
  var p=products.filter(function(x){ return x.id===id; })[0];
  if(!p) return;
  editId=id;
  document.getElementById("mtitle").textContent="Edit Item";
  document.getElementById("subbtn").textContent="Save Changes";
  document.getElementById("fname").value=p.name||"";
  document.getElementById("fcat").value=p.category||"";
  document.getElementById("fbrand").value=p.brand||"";
  document.getElementById("fcost").value=p.cost||"";
  document.getElementById("fsold").value=p.soldPrice!=null?p.soldPrice:"";
  document.getElementById("fdp").value=p.datePurchased||"";
  document.getElementById("fds").value=p.dateSold||"";
  setSt(p.status||"unsold"); uprev();
  document.getElementById("modal").className="modal-ov on";
}
function closeModal(){ document.getElementById("modal").className="modal-ov"; }

function setSt(s){
  curStatus=s;
  var opts={sold:"oSold",unsold:"oUns",did_not_sell:"oDns"};
  var cols={sold:"#7CB87A",unsold:"#C8A96E",did_not_sell:"#D4826A"};
  Object.keys(opts).forEach(function(k){
    var el=document.getElementById(opts[k]);
    if(k===s){ el.style.background=cols[k]+"18"; el.style.borderColor=cols[k]; el.style.color=cols[k]; }
    else{ el.style.background="rgba(255,255,255,.04)"; el.style.borderColor="rgba(255,255,255,.08)"; el.style.color="rgba(237,233,227,.35)"; }
  });
}

function uprev(){
  var c=parseFloat(document.getElementById("fcost").value);
  var s=parseFloat(document.getElementById("fsold").value);
  var el=document.getElementById("prev");
  if(!isNaN(c)&&!isNaN(s)){
    var pr=s-c, roi=c>0?((pr/c)*100).toFixed(0):0;
    el.style.display="flex";
    el.style.background=pr>=0?"rgba(124,184,122,.1)":"rgba(212,130,106,.1)";
    el.style.border="1px solid "+(pr>=0?"rgba(124,184,122,.2)":"rgba(212,130,106,.2)");
    document.getElementById("pproft").textContent=(pr>=0?"↑ +":"↓ ")+"$"+Math.round(Math.abs(pr));
    document.getElementById("pproft").style.color=pr>=0?"#7CB87A":"#D4826A";
    document.getElementById("proi").textContent=roi+"% ROI";
  } else { el.style.display="none"; }
}

function saveItem(){
  var name=document.getElementById("fname").value.trim(); if(!name) return;
  var cost=parseFloat(document.getElementById("fcost").value)||0;
  var spv=document.getElementById("fsold").value;
  var sp=spv!==""?parseFloat(spv):null;
  var p={id:editId||Date.now(),name:name,category:document.getElementById("fcat").value.trim(),brand:document.getElementById("fbrand").value.trim(),cost:cost,soldPrice:sp,profit:sp!=null?sp-cost:null,datePurchased:document.getElementById("fdp").value||null,dateSold:document.getElementById("fds").value||null,status:curStatus};
  if(editId) products=products.map(function(x){ return x.id===editId?p:x; });
  else products=[p].concat(products);
  closeModal(); renderAll();
  if(curCat) openCat(null);
  scheduleSave();
}

function delItem(id){
  if(!confirm("Remove this item?")) return;
  products=products.filter(function(p){ return p.id!==id; });
  renderAll(); if(curCat) openCat(null);
  scheduleSave();
}

function updCatsDl(){
  var cats=[];
  products.forEach(function(p){ if(p.category&&cats.indexOf(p.category)<0) cats.push(p.category); });
  cats.sort();
  document.getElementById("catsdl").innerHTML=cats.map(function(c){ return "<option value='"+c.replace(/'/g,"&#39;")+"'>"; }).join("");
}

function swTab(tab,btn){
  document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("on"); });
  document.querySelectorAll(".tb").forEach(function(b){ b.classList.remove("on"); });
  document.getElementById("p"+tab).classList.add("on");
  btn.classList.add("on");
}

init();

</script>
</body>
</html>
